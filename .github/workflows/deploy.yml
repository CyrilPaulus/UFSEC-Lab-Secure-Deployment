name: Build and Deploy

on: 
  workflow_dispatch: 

permissions:
  contents: read
  security-events: write
  
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: npm audit
        run: |
          npm install
          npm audit --audit-level=moderate
      
      - name: Build image
        run: |
          docker build -t myapp:latest .
